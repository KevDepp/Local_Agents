<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Logs Browser - Dual Pipeline</title>
    <link rel="stylesheet" href="logs.css" />
  </head>
  <body>
    <header>
      <h1>Logs Browser</h1>
      <div id="meta"></div>
    </header>

    <main>
      <section class="search">
        <label>
          Search (runId or threadId)
          <input id="search" type="text" placeholder="runId or threadId" />
        </label>
        <div class="row">
          <button id="refresh" type="button">Refresh</button>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <h2>Runs</h2>
          <table id="runsTable">
            <thead>
              <tr>
                <th>runId</th>
                <th>status</th>
                <th>updatedAt</th>
                <th>managerThreadId</th>
                <th>developerThreadId</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="panel">
          <h2>Threads</h2>
          <table id="threadsTable">
            <thead>
              <tr>
                <th>threadId</th>
                <th>roles</th>
                <th>runIds</th>
                <th>rolloutPath</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>Conversation</h2>
        <div class="row">
          <input id="runIdInput" type="text" placeholder="runId" />
          <button id="loadConversation" type="button">Load</button>
        </div>
        <div id="conversation"></div>
      </section>

      <section class="panel">
        <h2>File Viewer</h2>
        <div class="row">
          <input id="filePath" type="text" placeholder="absolute file path" />
          <button id="loadFile" type="button">Open</button>
        </div>
        <pre id="fileContent"></pre>
      </section>
    </main>

    <script src="logs.js"></script>
  </body>
</html>
